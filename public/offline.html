<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#D9006C" />
  <title>Sin conexion — Guelaguetza Connect</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a0a2e 0%, #2d1b4e 40%, #4a1942 100%);
      color: white;
      overflow: hidden;
    }

    .container {
      text-align: center;
      padding: 2rem;
      max-width: 400px;
    }

    /* Animated icon */
    .icon-wrapper {
      position: relative;
      width: 120px;
      height: 120px;
      margin: 0 auto 2rem;
    }

    .pulse-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 3px solid rgba(217, 0, 108, 0.3);
      animation: pulse 2s ease-out infinite;
    }

    .pulse-ring:nth-child(2) { animation-delay: 0.5s; }
    .pulse-ring:nth-child(3) { animation-delay: 1s; }

    @keyframes pulse {
      0% { transform: scale(0.8); opacity: 1; }
      100% { transform: scale(1.6); opacity: 0; }
    }

    .icon-circle {
      position: absolute;
      inset: 20px;
      border-radius: 50%;
      background: linear-gradient(135deg, #D9006C, #FF6B35);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 32px rgba(217, 0, 108, 0.4);
    }

    .icon-circle svg {
      width: 40px;
      height: 40px;
      stroke: white;
      stroke-width: 2;
      fill: none;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 0.75rem;
      background: linear-gradient(90deg, #fff, #ffb3d9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.875rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      padding: 0.875rem 1.5rem;
      border-radius: 1rem;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      backdrop-filter: blur(10px);
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: scale(1.02);
    }

    .btn:active { transform: scale(0.98); }

    .btn svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
    }

    .features {
      margin-top: 2.5rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    .feature {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 0.75rem;
      padding: 1rem 0.75rem;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .feature-icon {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }

    .feature-text {
      font-size: 0.7rem;
      color: rgba(255, 255, 255, 0.5);
    }

    /* Decorative background shapes */
    .bg-shape {
      position: fixed;
      border-radius: 50%;
      background: rgba(217, 0, 108, 0.08);
      z-index: -1;
    }

    .bg-shape:nth-child(1) { width: 300px; height: 300px; top: -100px; right: -100px; }
    .bg-shape:nth-child(2) { width: 200px; height: 200px; bottom: -50px; left: -80px; background: rgba(255, 107, 53, 0.08); }
    .bg-shape:nth-child(3) { width: 150px; height: 150px; bottom: 20%; right: -50px; background: rgba(139, 92, 246, 0.08); }
  </style>
</head>
<body>
  <div class="bg-shape"></div>
  <div class="bg-shape"></div>
  <div class="bg-shape"></div>

  <div class="container">
    <div class="icon-wrapper">
      <div class="pulse-ring"></div>
      <div class="pulse-ring"></div>
      <div class="pulse-ring"></div>
      <div class="icon-circle">
        <!-- Wifi-off icon -->
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
          <line x1="1" y1="1" x2="23" y2="23"></line>
          <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
          <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
          <path d="M10.71 5.05A16 16 0 0 1 22.56 9"></path>
          <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
          <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
          <line x1="12" y1="20" x2="12.01" y2="20"></line>
        </svg>
      </div>
    </div>

    <h1>Sin conexion a internet</h1>
    <p>
      Parece que no hay conexion disponible. Algunas funciones de
      Guelaguetza Connect necesitan internet para funcionar.
    </p>

    <button class="btn" onclick="window.location.reload()">
      <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"></polyline>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
      </svg>
      Reintentar conexion
    </button>

    <div class="features">
      <div class="feature">
        <div class="feature-icon">📍</div>
        <div class="feature-text">El mapa funciona offline con cache</div>
      </div>
      <div class="feature">
        <div class="feature-icon">🖼️</div>
        <div class="feature-text">Contenido visitado disponible en cache</div>
      </div>
      <div class="feature">
        <div class="feature-icon">📅</div>
        <div class="feature-text">Programa guardado localmente</div>
      </div>
      <div class="feature">
        <div class="feature-icon">🎨</div>
        <div class="feature-text">Modelos 3D en cache</div>
      </div>
    </div>
  </div>
</body>
</html>
