# ============================================
# Coolify Deploy - V3 (guelaguetzav3.mdconsultoria-ti.org)
# ============================================
# Variables de entorno requeridas en Coolify:
#   POSTGRES_PASSWORD - Password de PostgreSQL
#   JWT_SECRET       - Secret para JWT tokens
# ============================================

services:
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: guelaguetza_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-guelaguetza_secure_2026}
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    volumes:
      - backend-uploads:/app/public
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-guelaguetza_secure_2026}@postgres:5432/guelaguetza_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-guelaguetza_jwt_secret_2026}
      COOKIE_SECRET: ${COOKIE_SECRET:-${JWT_SECRET:-guelaguetza_jwt_secret_2026}}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://guelaguetzav3.mdconsultoria-ti.org,http://guelaguetzav3.mdconsultoria-ti.org}
      AUTO_SEED: "true"
      ENABLE_PAYMENTS: "false"
      ENABLE_NOTIFICATIONS: "false"
      ENABLE_ANALYTICS: "false"
      LOG_LEVEL: info
    user: "root"
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: "https://guelaguetzav3.mdconsultoria-ti.org"
    restart: always
    ports:
      - "3081:80"
    depends_on:
      - backend

volumes:
  postgres-data:
  redis-data:
  backend-uploads:
